<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="version" content="v1.1.0">
  <!-- version: v1.1.0 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="description" content="食材随机选择器 - 解决今天吃什么的选择困难症">
  <title>有什么好吃的? - 食物推荐器</title>
  <link rel="preload" href="js/ingredients_common.json" as="fetch" crossorigin="anonymous">
  <link rel="preload" href="css/style.css" as="style">
  <link rel="icon" href="img/chicken.ico" type="image/x-icon">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <!-- 头部 -->
    <header class="header">
      <div class="header-main">
        <h1 id="main-title">有什么好吃的?</h1>
        <div class="recommend-toggle-wrapper">
          <div class="recommend-toggle" id="recommend-toggle" role="tablist" aria-label="推荐范围切换">
            <button class="recommend-toggle-btn active" data-mode="food" role="tab" aria-selected="true">好吃的</button>
            <button class="recommend-toggle-btn" data-mode="all" role="tab" aria-selected="false">全部</button>
            <button class="recommend-toggle-btn" data-mode="snack" role="tab" aria-selected="false">小吃零食甜点饮品</button>
          </div>
          <span class="recommend-info-icon" id="recommend-info-icon" title="查看推荐范围说明">ℹ</span>
          <div class="recommend-tooltip" id="recommend-tooltip">
            <div class="recommend-tooltip-content" id="recommend-tooltip-content"></div>
          </div>
        </div>
      </div>
      <p>智能推荐一款美味佳肴</p>
    </header>

    <!-- 筛选区域 -->
    <section class="filter-section">
      <!-- 搜索框 -->
      <div class="search-box">
        <div class="search-input-wrapper">
          <input type="text" id="search-input" placeholder="搜索菜品...">
          <button id="search-clear" class="search-clear-btn" style="display:none;">×</button>
          <div class="search-dropdown" id="search-dropdown"></div>
        </div>
        <button id="search-btn" class="search-btn">🔍 搜索</button>
        <div class="common-toggle active" id="toggle-common" title="切换常见/全部模式">
          <span class="toggle-label" data-mode="all">全部</span>
          <div class="toggle-switch"><div class="toggle-knob"></div></div>
          <span class="toggle-label" data-mode="common">常见</span>
        </div>
      </div>

      <!-- 结果区域 -->
      <section class="result-section-inline" id="result-section">
        <div class="result-slider" id="result-slider">
          <!-- 本次推荐 -->
          <div class="result-slide" id="result-slide-main">
            <p class="result-placeholder">点击搜索或推荐按钮开始</p>
            <div class="result-card" id="result-card" style="display:none;">
              <div class="result-card-header">
                <span class="result-label">本次推荐</span>
                <button class="more-rec-btn" id="more-rec-btn">大家还喜欢 ➡</button>
              </div>
              <h2 class="result-name" id="result-name"></h2>
              <div class="result-tags" id="result-tags"></div>
            </div>
          </div>
          <!-- 更多推荐 -->
          <div class="result-slide" id="result-slide-more">
            <div class="more-rec-panel" id="more-rec-panel" style="display:none;">
              <div class="more-rec-header">
                <button class="more-rec-back" id="more-rec-back">← 返回</button>
                <div class="more-rec-actions">
                  <button class="more-rec-refresh" id="more-rec-refresh" title="换一批">🔄</button>
                </div>
              </div>
              <div class="more-rec-grid" id="more-rec-grid">
                <div class="more-rec-item" data-index="0"><span class="more-rec-name"></span><div class="more-rec-tags"></div></div>
                <div class="more-rec-item" data-index="1"><span class="more-rec-name"></span><div class="more-rec-tags"></div></div>
                <div class="more-rec-item" data-index="2"><span class="more-rec-name"></span><div class="more-rec-tags"></div></div>
                <div class="more-rec-item" data-index="3"><span class="more-rec-name"></span><div class="more-rec-tags"></div></div>
              </div>
            </div>
          </div>
        </div>
        <div class="result-blur-overlay" id="result-blur-overlay"></div>
      </section>

      <!-- 操作按钮 - 移至搜索框下方 -->
      <section class="action-section-inline">
        <button class="btn btn-primary" id="btn-select">开始推荐</button>
        <button class="btn btn-secondary" id="btn-reset">重置条件</button>
        <button class="btn btn-secondary" id="btn-catalog">食物大全</button>
      </section>

      <!-- 菜系筛选 -->
      <div class="filter-group">
        <div class="filter-label">菜系（可多选）</div>
        <div class="filter-tags" id="filter-cuisine"></div>
      </div>

      <!-- 用餐时段 -->
      <div class="filter-group">
        <div class="filter-label">用餐时段</div>
        <div class="filter-tags" id="filter-meal-type"></div>
      </div>

      <!-- 食材类型 -->
      <div class="filter-group">
        <div class="filter-label">食材类型（可多选）</div>
        <div class="filter-tags" id="filter-food-type"></div>
      </div>

      <!-- 餐品类型 -->
      <div class="filter-group">
        <div class="filter-label">餐品类型（可多选）</div>
        <div class="filter-tags" id="filter-dish-type"></div>
      </div>

      <!-- 健康标签 -->
      <div class="filter-group">
        <div class="filter-label">健康标签（可多选）</div>
        <div class="filter-tags" id="filter-health-tags"></div>
      </div>

      <!-- 常见过敏原 -->
      <div class="filter-group">
        <div class="filter-label">不包含以下食材(可多选)</div>
        <div class="filter-tags" id="filter-allergens"></div>
        <div class="allergen-tooltip" id="allergen-tooltip">
          <span class="tooltip-emoji">💡</span>可以选中特定的选项，然后保存网址，这样，下次打开的时候，就自动选中选项咯！
          <span class="tooltip-close" id="tooltip-close">×</span>
        </div>
      </div>
    </section>

    <!-- 统计信息 -->
    <div class="stats">
      当前 <strong id="stats-count">0</strong> / 共 <strong id="stats-total">0</strong> 种食材
    </div>
  </div>

  <!-- 食物大全模态框 -->
  <div class="catalog-modal" id="catalog-modal">
    <div class="catalog-content">
      <div class="catalog-header">
        <h2>食物大全</h2>
        <input type="text" id="catalog-search" class="catalog-search-input" placeholder="搜索过滤...">
        <button class="catalog-close" id="catalog-close">&times;</button>
      </div>
      <div class="catalog-body">
        <div class="catalog-list" id="catalog-list"></div>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
